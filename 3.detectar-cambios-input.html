<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detectar cambios en input</title>

    <!-- CDN de libreria de react  -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <!-- CDN de libreria de react dom -->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- CDN de libreria de babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <header>
    </header>


    <main>
        <!-- contenedor donde se renderiza (O pinta) la web o aplicación -->
        <div id="root"></div>
    </main>


    <footer>
    </footer>

    <script type="text/babel">
        const {useState ,useEffect} = React;
        const App = () => {

            const [cambio, setCambio] = useState("");

            function controlarForm(e) {
                e.preventDefault();
                const input = e.target.inputName.value;
                setCambio(input);
            }

            useEffect(
                () => {
                    console.log(`Hubo un cambio en el input, ${cambio}`)
                }, [cambio]
            );
            return (
                <div className="">
                    <h1>Reto</h1>
                    <ul>
                        <li>Crea un input</li>
                        <li>Guarda el valor en estado</li>
                        <li>Usa useEffect para hacer console.log cada vez que cambie</li>
                    </ul>
                    
                    <form onSubmit={ (e) => controlarForm(e) }>
                    
                        <input type="text" name="inputName" id=""/>
                        <button type="submit">Capturar</button>
                    
                    </form>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App/>)

    </script>

</body>

</html>
