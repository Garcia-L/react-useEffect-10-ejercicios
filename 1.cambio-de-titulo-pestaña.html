<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambio de titulo en pestaña</title>

    <!-- CDN de libreria de react  -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <!-- CDN de libreria de react dom -->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- CDN de libreria de babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <header>
    </header>


    <main>
        <!-- contenedor donde se renderiza (O pinta) la web o aplicación -->
        <div id="root"></div>
    </main>


    <footer>
    </footer>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [contador, setContador] = useState(0);

            const [aviso, setAviso] = useState("");
            function verAnuncio() {
                setAviso("UseEffect, cambia el título de la pestaña del navegador. useState: controla lo que ves, useEffect: hace cosas externas como APIs, DOM, eventos, timersm storage, librerías externas")
            }

            useEffect(() => {
                document.title = `Aqui está el cambio: ${contador}`;
            }, [contador]
            );

            return (
                <div className="">
                    <h1>{contador}</h1>
                    <p>{aviso}</p>
                    <button onClick={() => {
                        setContador(e => e + 1);
                        verAnuncio()
                    }}>+</button>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />)

    </script>

</body>

</html>
