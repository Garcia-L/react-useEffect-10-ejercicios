<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensaje en consola</title>

    <!-- CDN de libreria de react  -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <!-- CDN de libreria de react dom -->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- CDN de libreria de babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <header>
    </header>


    <main>
        <!-- contenedor donde se renderiza (O pinta) la web o aplicación -->
        <div id="root"></div>
    </main>


    <footer>
    </footer>

    <script type="text/babel">
        const {useState, useEffect} = React; 
        const App = () => {

            const [aviso, setAviso] = useState("");

            function mostrarAviso() {
                setAviso("Revisa la consola, veras un mensaje nuevo")
            };

            useEffect( () => {
                    console.log("Hola, useEffect se ejecutó: COMPONENTE MONTADO");
                }, []
            );

            return (
                <div className="">
                    <h1>Reto</h1>
                    <ul>
                        <li>Muestra en consola: "Componente montado"</li>
                        <li>Solo debe ejecutarse una vez</li>    
                    </ul>
                    <button onClick={ ()=> {
                        mostrarAviso(); 
                    }}>Ejecutar useEffect</button>
                    <p>{aviso}</p>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App/>)

    </script>

</body>

</html>
