<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simular fetch de Api</title>

    <!-- CDN de libreria de react  -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <!-- CDN de libreria de react dom -->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- CDN de libreria de babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <header>
    </header>


    <main>
        <!-- contenedor donde se renderiza (O pinta) la web o aplicación -->
        <div id="root"></div>
    </main>


    <footer>
    </footer>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [usuarios, setUsuarios] = useState([]);

            useEffect(
                () => {
                    const obtenerDatos = async () => {
                        try {
                            const res = await fetch("https://pokeapi.co/api/v2/pokemon");
                            const datos = await res.json();
                            setUsuarios(datos.results);
                            console.log(datos.results);

                        }
                        catch (error) {
                            console.error(error)
                        }
                    }
                    obtenerDatos();
                }
                , []

            );

            return (
                <div>
                    <h1>Reto simula fetch</h1>
                    <ul>
                        <li>Usa fetch en: https://pokeapi.co/api/v2/pokemon</li>
                        <li>Muestra los resultados en pantalla</li>
                    </ul>

                    <ul>
                    {
                        usuarios.map( (e, index) => (
                            <li key={index}>{e.name}</li>
                        )) 
                    }
                    </ul>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />)

    </script>

</body>

</html>
