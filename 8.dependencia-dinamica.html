<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dependencia dinamica</title>

    <!-- CDN de libreria de react  -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <!-- CDN de libreria de react dom -->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- CDN de libreria de babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <header>
    </header>


    <main>
        <!-- contenedor donde se renderiza (O pinta) la web o aplicación -->
        <div id="root"></div>
    </main>


    <footer>
    </footer>

    <script type="text/babel">
        const {useState, useEffect} = React;
        
        const App = () => {
            const [busqueda, setBusqueda] = useState("");
            const [resultado, setResultado] = useState([]);
    
            const usuarios= ["Ana", "Luis", "Carlos", "María"];

            useEffect(
                () => {
                    console.log("Effect ejecutando", busqueda);
                    const filtro = usuarios.filter( (e) => e.includes(busqueda));

                    setResultado(filtro);
                    
                }, [busqueda]
            );

            return (
                <div className="">
                    <h1>Reto</h1>
                    <ul>
                        <li>Crea un input para busqueda</li>
                        <li>Utiliza useState para la busqueda y otro para el resultado</li>
                        <li>Crea un array de usuarios con 4 nombres</li>
                        <li>Crea un efecto cuya dependencia sea la "busqueda" y filtre los usuarios que cumplan con el criterio escrito en el input</li>
                    </ul>

                    <input type="text" value={busqueda} onChange={ (e) => setBusqueda(e.target.value)} />
                    
                    <ul>
                        {
                            resultado.map(
                                (e, index) => (
                                    <li key={index}>{e}</li>
                                )   
                            )
                        }
                    </ul>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App/>)

    </script>

</body>

</html>
