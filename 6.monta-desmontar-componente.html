<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montar y desmontar componente</title>

    <!-- CDN de libreria de react  -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <!-- CDN de libreria de react dom -->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- CDN de libreria de babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <header>
    </header>


    <main>
        <!-- contenedor donde se renderiza (O pinta) la web o aplicación -->
        <div id="root"></div>
    </main>


    <footer>
    </footer>

    <script type="text/babel">
        const { useState, useEffect } = React;

        

        const App = () => {
            const [mostrar, setMostrar] = useState(false);
            const textBtn = mostrar ? "Desmontar" : "Montar";

            return (
                <div className="">
                    <h1>Reto</h1>
                    <ul>
                        <li>Crea un componente, un div con mensaje dentro</li>
                        <li>Crea un boton que muestre y oculte(CleanUp) el componente</li>
                    </ul>
  
                    <button onClick={ ()=> setMostrar(!mostrar) }>{textBtn}</button>

                    {mostrar && <Componente/>}

                </div>
            );
        };

        const Componente = () => {

            useEffect(
                () => {
                    console.log("Componente montado en el DOM");

                    // cleanUp que limpiar el efecto, este return queda en memoria, esperando a finalizar el efecto para aplicarse como limpiador
                    return () => {
                        // recuerda hacer cleanUp, ya que, el efecto puede seguir viviendo en el navegador aunque el componente no exista
                        console.log("Componente desmontado (CleanUp)")
                    }

                    // [] esta vacío para que ocurra 1 vez
                }, []
            );

            return (
                <div style={{border: "1px solid black"}}>
                    <p>Hola, soy el componente</p>
                </div>
            )
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />)

    </script>

</body>

</html>
